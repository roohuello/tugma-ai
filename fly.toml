app = "tugma-ai"
primary_region = "sin"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = "10s"
    timeout = "2s"

[env]
  ENVIRONMENT = "production"

[build]
  image = "tugma-ai:latest"
